<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Zarlar</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:     #0a0d12;
  --card:   #111620;
  --card2:  #161d28;
  --border: rgba(255,255,255,0.07);
  --text:   #e8eef4;
  --muted:  #6b7f8e;
  --dim:    #1e2a36;
  --green:  #00d18c;
  --amber:  #ffb030;
  --red:    #ff4555;
  --blue:   #4da6ff;
  --purple: #b080ff;
  --font:   'DM Sans', sans-serif;
  --mono:   'DM Mono', monospace;
}
* { box-sizing:border-box; margin:0; padding:0; }
html,body { height:100%; background:var(--bg); color:var(--text); font-family:var(--font); -webkit-font-smoothing:antialiased; }

/* HEADER */
.hdr { display:flex; align-items:center; justify-content:space-between; padding:16px 18px 12px; border-bottom:1px solid var(--border); }
.logo { font-size:20px; font-weight:600; letter-spacing:-0.5px; }
.logo span { color:var(--green); }
.hdr-right { display:flex; align-items:center; gap:10px; }
.dot { width:7px; height:7px; border-radius:50%; background:var(--green); box-shadow:0 0 6px var(--green); }
.clk { font-family:var(--mono); font-size:12px; color:var(--muted); }

/* TABS */
.tabs { display:flex; gap:0; border-bottom:1px solid var(--border); }
.tab { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; padding:10px 4px;
  background:none; border:none; border-bottom:2px solid transparent;
  color:var(--muted); font-family:var(--font); font-size:10px; font-weight:500;
  cursor:pointer; transition:all 0.2s; letter-spacing:0.3px; }
.tab.on { color:var(--text); border-bottom-color:var(--green); }
.tab:hover:not(.on) { color:var(--text); background:rgba(255,255,255,0.02); }

/* TAB CONTENT */
.page { display:none; padding:14px 14px 24px; }
.page.on { display:block; }

/* SYNOPTISCH GRID */
.syn { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }

/* CONTROLLER KAART */
.krt {
  background:var(--card); border:1px solid var(--border); border-radius:16px;
  padding:14px 8px 10px; display:flex; flex-direction:column; align-items:center; gap:6px;
  cursor:pointer; transition:all 0.18s; text-decoration:none; color:inherit; position:relative;
}
.krt:hover { transform:translateY(-2px); border-color:rgba(255,255,255,0.14); }
.krt.ok  { border-color:rgba(0,209,140,0.2); }
.krt.err { border-color:rgba(255,69,85,0.2); opacity:.6; }
.krt.wt  { border-color:rgba(255,176,48,0.2); }

.icon-wrap {
  width:62px; height:62px; border-radius:50%;
  background:rgba(255,255,255,0.04);
  display:flex; align-items:center; justify-content:center;
  position:relative;
}
.sdot {
  position:absolute; top:2px; right:2px;
  width:10px; height:10px; border-radius:50%; border:2px solid var(--card);
}
.ok  .sdot { background:var(--green); box-shadow:0 0 5px var(--green); }
.err .sdot { background:var(--red); }
.wt  .sdot { background:var(--amber); animation:blink 1.4s infinite; }
@keyframes blink { 0%,100%{opacity:1}50%{opacity:0.2} }

.krt-name { font-size:10px; font-weight:600; color:var(--muted); letter-spacing:.8px; text-transform:uppercase; text-align:center; }
.krt-val  { font-family:var(--mono); font-size:13px; font-weight:500; text-align:center; line-height:1.2; }
.krt-sub  { font-size:10px; color:var(--muted); text-align:center; }

/* QUICK STATS */
.qs { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:12px; }
.qp { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:10px 12px; display:flex; align-items:center; gap:9px; }
.qp-lbl { font-size:10px; color:var(--muted); }
.qp-val { font-family:var(--mono); font-size:15px; font-weight:500; margin-top:1px; }

/* SCÈNE ROW */
.srow { display:flex; gap:7px; overflow-x:auto; padding-bottom:4px; margin-bottom:14px; scrollbar-width:none; }
.srow::-webkit-scrollbar { display:none; }
.sbtn { flex-shrink:0; padding:7px 14px; background:var(--card); border:1px solid var(--border);
  border-radius:99px; color:var(--muted); font-family:var(--font); font-size:12px; font-weight:500;
  cursor:pointer; transition:all 0.18s; white-space:nowrap; }
.sbtn.on, .sbtn:hover { background:rgba(0,209,140,0.1); border-color:rgba(0,209,140,0.4); color:var(--green); }

/* KAMER GROEP */
.kg { margin-bottom:18px; }
.kg-titel { font-size:11px; font-weight:600; color:var(--muted); letter-spacing:1px; text-transform:uppercase; margin-bottom:10px; }
.pgrid { display:flex; flex-wrap:wrap; gap:12px; }
.pitem { display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; }
.pcircle { width:46px; height:46px; border-radius:50%; background:rgba(255,255,255,0.05); border:2px solid var(--dim);
  display:flex; align-items:center; justify-content:center; transition:all 0.2s; }
.pcircle.aan { border-color:transparent; box-shadow:0 0 14px rgba(255,180,60,0.35); }
.plbl { font-size:9px; color:var(--muted); text-align:center; max-width:46px; line-height:1.2; }

/* CIRCUITS */
.clist { display:flex; flex-direction:column; gap:7px; }
.crow { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:11px 13px; display:flex; align-items:center; gap:11px; }
.cinfo { flex:1; }
.cname { font-size:13px; font-weight:500; }
.cdet { font-size:11px; color:var(--muted); font-family:var(--mono); margin-top:1px; }
.cbar { height:3px; background:var(--dim); border-radius:2px; margin-top:5px; overflow:hidden; }
.cbfill { height:100%; border-radius:2px; transition:width .4s; }

/* SECURITY */
.htoggle { display:flex; align-items:center; justify-content:space-between; background:var(--card); border:1px solid var(--border); border-radius:14px; padding:13px 15px; margin-bottom:12px; }
.ht-lbl { font-size:14px; font-weight:500; }
.ht-sub { font-size:11px; color:var(--muted); margin-top:2px; }
.sw { width:48px; height:26px; border-radius:99px; background:var(--dim); border:none; cursor:pointer; position:relative; transition:background .25s; }
.sw.on { background:var(--green); }
.sw::after { content:\'\'; position:absolute; width:20px; height:20px; border-radius:50%; background:#fff; top:3px; left:3px; transition:transform .25s; box-shadow:0 1px 3px rgba(0,0,0,.3); }
.sw.on::after { transform:translateX(22px); }
.sgrid { display:flex; flex-direction:column; gap:8px; }
.srow2 { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:11px 13px; display:flex; align-items:center; gap:11px; }
.si { flex:1; }
.sn { font-size:13px; font-weight:500; }
.ss { font-size:11px; margin-top:2px; font-family:var(--mono); }
.mv-on { color:var(--amber); }
.mv-off { color:var(--muted); }

/* SECTIE TITEL */
.stitel { font-size:11px; font-weight:600; color:var(--muted); letter-spacing:.8px; text-transform:uppercase; margin:14px 0 8px; }
</style>
</head>
<body>

<header class="hdr">
  <div class="logo">Zar<span>lar</span></div>
  <div class="hdr-right">
    <div class="dot" id="gdot"></div>
    <div class="clk" id="clk"></div>
  </div>
</header>

<nav class="tabs">
  <button class="tab on" onclick="tab('syn',this)">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
    Overzicht
  </button>
  <button class="tab" onclick="tab('licht',this)">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 18h6M10 21h4"/><path d="M12 2C8.13 2 5 5.13 5 9c0 2.38 1.19 4.47 3 5.74V17h8v-2.26C17.81 13.47 19 11.38 19 9c0-3.87-3.13-7-7-7z"/></svg>
    Lichten
  </button>
  <button class="tab" onclick="tab('hvac',this)">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z"/></svg>
    HVAC
  </button>
  <button class="tab" onclick="tab('sec',this)">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 2L3 7v5c0 5.25 3.75 10.15 9 11.35C17.25 22.15 21 17.25 21 12V7L12 2z"/></svg>
    Security
  </button>
</nav>

<!-- ═══ OVERZICHT ═══ -->
<div class="page on" id="pg-syn">
  <div class="syn" id="syn-grid"></div>
  <div class="qs" id="qs-grid"></div>
</div>

<!-- ═══ LICHTEN ═══ -->
<div class="page" id="pg-licht">
  <div class="srow" id="scene-row"></div>
  <div id="licht-kamers"></div>
</div>

<!-- ═══ HVAC ═══ -->
<div class="page" id="pg-hvac">
  <div class="clist" id="c-list"><div style="color:var(--muted);text-align:center;padding:30px;font-size:13px">Laden...</div></div>
</div>

<!-- ═══ SECURITY ═══ -->
<div class="page" id="pg-sec">
  <div class="htoggle">
    <div><div class="ht-lbl">Thuis / Weg</div><div class="ht-sub" id="hm-txt">Thuis modus actief</div></div>
    <button class="sw on" id="hm-sw" onclick="togHome()"></button>
  </div>
  <div class="sgrid" id="s-grid"><div style="color:var(--muted);text-align:center;padding:30px;font-size:13px">Laden...</div></div>
</div>

// ═══ KLEURHELPERS ═════════════════════════════════════════════════════════════
function tc(t) {
  if (t < 18) return '#4da6ff';
  if (t < 22) return '#00d18c';
  if (t < 26) return '#ffb030';
  return '#ff4555';
}
function bc(t) {  // boilerlaag kleur
  if (t < 30) return '#0d2040';
  if (t < 45) return '#0d402a';
  if (t < 60) return '#40350d';
  if (t < 70) return '#5a2008';
  return '#5a0808';
}
function rssiKleur(r) {
  if (r >= -60) return '#00d18c';
  if (r >= -70) return '#ffb030';
  return '#ff4555';
}

// ═══ SYNOPTISCH ═══════════════════════════════════════════════════════════════
function bouwSyn(s) {
  const hvac = s.hvac || {}, eco = s.eco || {}, room = s.room || {};

  const kaarten = [
    // HVAC
    {
      naam: 'HVAC', link: '#', kl: hvac.online ? 'ok' : 'err',
      icon: () => {
        const actief = ['p','q','r','s','t','u','v'].some(k => parseInt(hvac[k])===1);
        const kw = parseFloat(hvac.w)||0;
        const klr = actief ? '#ff8030' : '#4da6ff';
        return drawheating(40, klr);
      },
      val: () => hvac.online ? (parseFloat(hvac.w)||0).toFixed(1)+' kW' : '—',
      sub: () => hvac.online ? `${['p','q','r','s','t','u','v'].filter(k=>parseInt(hvac[k])===1).length}/7 circuits` : 'offline'
    },
    // ECO Boiler
    {
      naam: 'ECO Boiler', link: '/eco.html', kl: eco.online ? 'ok' : 'err',
      icon: () => {
        const t = [parseFloat(eco.b)||0,parseFloat(eco.c)||0,parseFloat(eco.d)||0,
                   parseFloat(eco.e)||0,parseFloat(eco.f)||0,parseFloat(eco.g)||0];
        // Boiler SVG met 6 gekleurde lagen
        return `<svg viewBox="0 0 60 90" width="42" height="60" xmlns="http://www.w3.org/2000/svg">
          <rect x="8" y="4" width="44" height="80" rx="10" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
          ${t.map((temp,i) => `<rect x="10" y="${7+i*12}" width="40" height="11" rx="2" fill="${bc(temp)}"/>`).join('')}
          <rect x="8" y="4" width="44" height="80" rx="10" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
          <rect x="20" y="0" width="20" height="6" rx="2" fill="rgba(255,255,255,0.18)"/>
          <rect x="20" y="83" width="20" height="6" rx="2" fill="rgba(255,255,255,0.18)"/>
        </svg>`;
      },
      val: () => eco.online ? (parseFloat(eco.i)||0).toFixed(1)+' kWh' : '—',
      sub: () => eco.online ? `${(parseFloat(eco.l)||0).toFixed(0)}°C collector` : 'offline'
    },
    // Energie
    {
      naam: 'Energie', link: '/epex-grafiek.html', kl: 'ok',
      icon: () => drawelectricenergy(38, '#ffb030', '#cc8800'),
      val: () => 'EPEX',
      sub: () => 'klik voor grafiek'
    },
    // Room
    {
      naam: 'Eetplaats', link: '#', kl: room.online ? 'ok' : 'err',
      icon: () => {
        const t = parseFloat(room.f)||parseFloat(room.e)||20;
        return drawhome(40, tc(t));
      },
      val: () => room.online ? `${(parseFloat(room.f)||0).toFixed(1)}°C` : '—',
      sub: () => room.online ? `${parseInt(room.h)||0}% vocht` : 'offline'
    },
    // Solar
    {
      naam: 'Zon', link: '#', kl: 'ok',
      icon: () => drawSunlight(40, '#ffb030', 'rgba(255,176,48,0.18)'),
      val: () => '—',
      sub: () => 'solar (later)'
    },
    // WiFi / Dashboard
    {
      naam: 'Dashboard', link: '/matrix.html', kl: 'wt',
      icon: () => {
        const r = parseInt(hvac.ac)||parseInt(eco.p)||-72;
        const klr = rssiKleur(r);
        return drawwifi(40, klr, klr, `${klr}99`, `${klr}44`, 'rgba(255,255,255,0.06)');
      },
      val: () => `${parseInt(hvac.ac)||-70} dBm`,
      sub: () => 'WiFi dashboard'
    },
  ];

  const grid = document.getElementById('syn-grid');
  grid.innerHTML = '';
  kaarten.forEach(k => {
    const a = document.createElement('a');
    a.href = k.link || '#';
    a.className = `krt ${k.kl}`;
    a.innerHTML = `
      <div class="icon-wrap">${k.icon()}<div class="sdot"></div></div>
      <div class="krt-name">${k.naam}</div>
      <div class="krt-val" style="color:${k.kl==='ok'?'var(--text)':'var(--muted)'}">${k.val()}</div>
      <div class="krt-sub">${k.sub()}</div>`;
    grid.appendChild(a);
  });

  // Quick stats
  const hvacKw = (parseFloat(hvac.w)||0).toFixed(1);
  const roomT  = (parseFloat(room.f)||0).toFixed(1);
  const ecoQ   = (parseFloat(eco.i)||0).toFixed(1);
  const vent   = parseInt(hvac.x)||0;

  document.getElementById('qs-grid').innerHTML = `
    <div class="qp">
      ${drawheating(22, parseFloat(hvac.w)>0?'#ff8030':'#3a4a5a')}
      <div><div class="qp-lbl">HVAC vermogen</div>
      <div class="qp-val" style="color:${parseFloat(hvac.w)>0?'#ff8030':'var(--muted)'}">${hvac.online?hvacKw+' kW':'—'}</div></div>
    </div>
    <div class="qp">
      ${drawhome(22, tc(parseFloat(room.f)||20))}
      <div><div class="qp-lbl">Eetplaats temp</div>
      <div class="qp-val" style="color:${tc(parseFloat(room.f)||20)}">${room.online?roomT+'°C':'—'}</div></div>
    </div>
    <div class="qp">
      ${drawelectricenergy(22,'#ffb030','#cc8800')}
      <div><div class="qp-lbl">ECO energie</div>
      <div class="qp-val" style="color:${parseFloat(eco.i)>15?'#00d18c':'#ffb030'}">${eco.online?ecoQ+' kWh':'—'}</div></div>
    </div>
    <div class="qp">
      ${drawBreathingair(22, '#4da6ff', 'rgba(77,166,255,0.4)')}
      <div><div class="qp-lbl">Ventilatie</div>
      <div class="qp-val" style="color:${vent>0?'#4da6ff':'var(--muted)'}">${hvac.online?vent+'%':'—'}</div></div>

}

// ═══ LICHTEN ══════════════════════════════════════════════════════════════════
const SCENES = ['☀️ Alles','🌙 Nacht','🎬 Film','🍽️ Diner','🚶 Welkom','📚 Lezen'];

function bouwLichten(s) {
  // Scenes
  const sr = document.getElementById('scene-row');
  sr.innerHTML = SCENES.map((sc,i) =>
    `<button class="sbtn${i===0?' on':''}" onclick="kiesScene(this)">${sc}</button>`).join('');

  // Pixels
  const room = s.room || {};
  const kamers = document.getElementById('licht-kamers');
  if (!room.online) { kamers.innerHTML = '<div style="color:var(--muted);text-align:center;padding:20px;font-size:13px">Eetplaats offline</div>'; return; }

  const pixStr = (room.t||'P=').replace('P=','') || '1111111';
  const r = parseInt(room.q)||255, g = parseInt(room.r)||200, b = parseInt(room.s)||100;
  let pixels = '';
  for (let i=0; i<pixStr.length; i++) {
    const aan = pixStr[i]==='1';
    const klr = aan ? `rgb(${r},${g},${b})` : '';
    pixels += `<div class="pitem" onclick="togPixel(${i})">
      <div class="pcircle${aan?' aan':''}" style="${aan?'background:'+klr+';box-shadow:0 0 12px '+klr+'66':''}">
        ${drawlighting(24, aan?'rgba(255,255,255,0.9)':'#2a3a4a', aan?'rgba(255,255,255,0.6)':'#1a2a3a')}
      </div>
      <div class="plbl">Pixel ${i}</div>
    </div>`;
  }
  kamers.innerHTML = `<div class="kg"><div class="kg-titel">Eetplaats</div><div class="pgrid">${pixels}</div></div>`;
}

function kiesScene(btn) {
  document.querySelectorAll('#scene-row .sbtn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
}

function togPixel(idx) {
  fetch('/api/set/room', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({['p'+idx]:1})}).catch(()=>{});
}

// ═══ HVAC ═════════════════════════════════════════════════════════════════════
function bouwHVAC(s) {
  const hvac = s.hvac || {};
  const list = document.getElementById('c-list');
  if (!hvac.online) { list.innerHTML = '<div style="color:var(--muted);text-align:center;padding:30px;font-size:13px">HVAC offline</div>'; return; }

  const namen = ['BB','WP','BK','ZP','EP','KK','IK'];
  const onKeys = ['p','q','r','s','t','u','v'];
  const dutyKeys = ['i','j','k','l','m','n','o'];

  list.innerHTML = onKeys.map((k,i) => {
    const aan = parseInt(hvac[k])===1;
    const duty = Math.round(parseFloat(hvac[dutyKeys[i]])||0);
    const klr = aan ? '#ff8030' : '#2a3a4a';
    return `<div class="crow">
      ${drawheating(28, klr)}
      <div class="cinfo">
        <div class="cname" style="color:${aan?'#ff8030':'var(--muted)'}">${namen[i]}</div>
        <div class="cdet">${aan?'AAN':'UIT'} &nbsp;·&nbsp; duty 4u: ${duty}%</div>
        <div class="cbar"><div class="cbfill" style="width:${duty}%;background:${klr}"></div></div>
      </div>
    </div>`;
  }).join('') + `<div class="crow">
    ${drawBreathingair(28, '#4da6ff', 'rgba(77,166,255,0.35)')}
    <div class="cinfo">
      <div class="cname" style="color:${parseInt(hvac.x)>0?'#4da6ff':'var(--muted)'}">Ventilatie</div>
      <div class="cdet">${parseInt(hvac.x)||0}%</div>
      <div class="cbar"><div class="cbfill" style="width:${parseInt(hvac.x)||0}%;background:#4da6ff"></div></div>
    </div>
  </div>`;
}

// ═══ DATA LADEN ═══════════════════════════════════════════════════════════════
async function laad() {
  try {
    const r = await fetch('/api/status');
    if (!r.ok) throw new Error();
    const s = await r.json();
    document.getElementById('gdot').style.cssText = Object.values(s).some(c=>c.online)
      ? 'background:#00d18c;box-shadow:0 0 6px #00d18c'
      : 'background:#ff4555';
